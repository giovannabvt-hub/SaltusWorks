name: Deploy to GitHub Pages

on:
  push:
    # Solo la rama por defecto publica en Pages; evitar disparar dos veces
    # (rama por defecto + main) para que un run no cancele al otro.
    branches: [claude/saltus-works-website-vzy2su]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy: el más nuevo cancela a los anteriores en cola (evita atascos)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        # Dominio propio (saltusworks.org) => se sirve en la raíz, sin basePath.
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
